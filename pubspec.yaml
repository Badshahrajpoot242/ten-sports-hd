name: ten_sports_hd
description: TEN SPORTS HD - Live Cricket & Sports Streaming App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_database: ^11.1.0
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.2.1

  # State Management
  provider: ^6.1.2

  # Video Players
  video_player: ^2.8.6
  chewie: ^1.8.1
  youtube_player_flutter: ^9.0.2

  # Image
  cached_network_image: ^3.3.1

  # UI & Utils
  flutter_spinkit: ^5.2.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.1+2
  google_fonts: ^6.2.1
  connectivity_plus: ^6.0.3
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fluttertoast: ^8.2.8
  permission_handler: ^11.3.1
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7
  wakelock_plus: ^1.2.5
  package_info_plus: ^8.0.0
  in_app_review: ^2.0.9

  # Ads (integration-ready)
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: AppFont
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700
        - asset: assets/fonts/Oswald-Regular.ttf
          weight: 400
