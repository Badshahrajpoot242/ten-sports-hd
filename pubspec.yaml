name: ten_sports_hd
description: TEN SPORTS HD - Professional Live Sports Streaming App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video Player
  video_player: ^2.8.3
  chewie: ^1.7.4

  # YouTube Player
  youtube_player_flutter: ^8.1.2

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.4

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3

  # Storage (local fallback before Firebase)
  shared_preferences: ^2.2.3

  # Firebase (commented until ready to connect)
  # firebase_core: ^2.27.0
  # firebase_database: ^10.4.9
  # firebase_messaging: ^14.7.20
  # firebase_analytics: ^10.8.9
  # cloud_firestore: ^4.15.9

  # Ads (commented until ready)
  # google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
