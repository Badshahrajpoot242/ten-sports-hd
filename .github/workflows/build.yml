name: Build TEN SPORTS HD APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - run: flutter pub get
      - run: mkdir -p assets/fonts assets/images assets/icons assets/animations && touch assets/fonts/Rajdhani-Regular.ttf assets/fonts/Rajdhani-Bold.ttf assets/fonts/Rajdhani-SemiBold.ttf
      - run: flutter build apk --release --no-shrink
      - uses: actions/upload-artifact@v4
        with:
          name: TEN-SPORTS-HD-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
